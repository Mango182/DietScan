workflows:
  # ANDROID DEV
  android-dev:
    name: DietScan - Android Dev
    max_build_duration: 60
    instance_type: linux_x2
    environment:
      node: 22
      vars:
        APP_VARIANT: "development"
      groups:
        - github_credentials   # provides GITHUB_TOKEN
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: "develop"
          include: true
    scripts:
      - name: Install dependencies
        script: |
          cd DietScan
          npm ci --legacy-peer-deps
      - name: Prebuild (generate native android project)
        script: |
          cd DietScan
          npx expo prebuild --platform android --clean
      - name: Build debug APK
        script: |
          cd DietScan/android
          ./gradlew assembleDebug
      - name: Push APK to GitHub
        script: |
          git config --global user.email "codemagic-bot@dietscan.com"
          git config --global user.name "Codemagic Bot"
          git remote set-url origin https://$GITHUB_TOKEN@github.com/Mango182/DietScan.git
          BRANCH_NAME=$(git rev-parse --abbrev-ref HEAD)
          cd "$CM_BUILD_DIR"
          mkdir -p Runnables
          cp DietScan/android/app/build/outputs/apk/debug/*.apk Runnables/DietScan-dev.apk
          git add Runnables/DietScan-dev.apk
          git commit -m "ci: add Android dev APK [skip ci]"
          git push origin "$BRANCH_NAME"
    artifacts:
      - DietScan/android/app/build/outputs/apk/debug/*.apk

  # ANDROID RELEASE
  android-release:
    name: DietScan - Android Release
    max_build_duration: 60
    instance_type: linux_x2
    environment:
      node: 22
      vars:
        APP_VARIANT: "production"
      groups:
        - github_credentials
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: "master"
          include: true
    scripts:
      - name: Install dependencies
        script: |
          cd DietScan
          npm ci --legacy-peer-deps
      - name: Prebuild (generate native android project)
        script: |
          cd DietScan
          npx expo prebuild --platform android --clean
      - name: Build release APK (unsigned)
        script: |
          cd DietScan/android
          ./gradlew assembleRelease
      - name: Push APK to GitHub
        script: |
          git config --global user.email "codemagic-bot@dietscan.com"
          git config --global user.name "Codemagic Bot"
          git remote set-url origin https://$GITHUB_TOKEN@github.com/Mango182/DietScan.git
          BRANCH_NAME=$(git rev-parse --abbrev-ref HEAD)
          cd "$CM_BUILD_DIR"
          mkdir -p Runnables
          cp DietScan/android/app/build/outputs/apk/release/*.apk Runnables/DietScan-release.apk
          git add Runnables/DietScan-release.apk
          git commit -m "ci: add Android release APK [skip ci]"
          git push origin "$BRANCH_NAME"
    artifacts:
      - DietScan/android/app/build/outputs/apk/release/*.apk

  # iOS DEV
  ios-dev:
    name: DietScan - iOS Dev
    max_build_duration: 90
    instance_type: mac_mini_m2
    environment:
      node: 22
      xcode: latest
      cocoapods: default
      vars:
        APP_VARIANT: "development"
        XCODE_SCHEME: "DietScanDev"
      groups:
        - github_credentials
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: "develop"
          include: true
    scripts:
      - name: Install dependencies
        script: |
          cd DietScan
          npm ci --legacy-peer-deps
      - name: Prebuild (generate native ios project)
        script: |
          cd DietScan
          npx expo prebuild --platform ios --clean
      - name: Install pods
        script: |
          cd DietScan/ios && pod install
      - name: Build unsigned .app (no codesign)
        script: |
          cd DietScan/ios
          xcodebuild -workspace *.xcworkspace \
            -scheme "$XCODE_SCHEME" \
            -configuration Debug \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build
      - name: Package unsigned IPA
        script: |
          cd DietScan/ios/build/Build/Products/Debug-iphoneos
          mkdir -p Payload
          cp -r *.app Payload/
          zip -r DietScan-dev-unsigned.ipa Payload
      - name: Push IPA to GitHub
        script: |
          git config --global user.email "codemagic-bot@dietscan.com"
          git config --global user.name "Codemagic Bot"
          git remote set-url origin https://$GITHUB_TOKEN@github.com/Mango182/DietScan.git
          BRANCH_NAME=$(git rev-parse --abbrev-ref HEAD)
          cd "$CM_BUILD_DIR"
          mkdir -p Runnables
          cp DietScan/ios/build/Build/Products/Debug-iphoneos/DietScan-dev-unsigned.ipa Runnables/DietScan-dev-unsigned.ipa
          git add Runnables/DietScan-dev-unsigned.ipa
          git commit -m "ci: add iOS dev IPA [skip ci]"
          git push origin "$BRANCH_NAME"
    artifacts:
      - DietScan/ios/build/Build/Products/Debug-iphoneos/*.ipa

  # iOS RELEASE
  ios-release:
    name: DietScan - iOS Release
    max_build_duration: 90
    instance_type: mac_mini_m2
    environment:
      node: 22
      xcode: latest
      cocoapods: default
      vars:
        APP_VARIANT: "production"
        XCODE_SCHEME: "DietScan"
      groups:
        - github_credentials
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: "master"
          include: true
    scripts:
      - name: Install dependencies
        script: |
          cd DietScan
          npm ci --legacy-peer-deps
      - name: Prebuild (generate native ios project)
        script: |
          cd DietScan
          npx expo prebuild --platform ios --clean
      - name: Install pods
        script: |
          cd DietScan/ios && pod install
      - name: Build unsigned .app (no codesign)
        script: |
          cd DietScan/ios
          xcodebuild -workspace *.xcworkspace \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
