      - name: Push IPA to GitHub
        script: |
          git config --global user.email "codemagic-bot@dietscan.com"
          git config --global user.name "Codemagic Bot"
          git remote set-url origin https://$GITHUB_TOKEN@github.com/Mango182/DietScan.git
          BRANCH_NAME=$(git rev-parse --abbrev-ref HEAD)
          cd "$CM_BUILD_DIR"
          mkdir -p Runnables
